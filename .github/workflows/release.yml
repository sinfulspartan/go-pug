# ---------------------------------------------------------------------------
# GitHub Actions — Release
# ---------------------------------------------------------------------------
# Triggered when a vX.Y.Z tag is pushed.
#
# Jobs:
#   test    — full test suite + race detector (must pass before releasing)
#   release — creates a GitHub Release with auto-generated notes
#
# Note: go-pug is an importable library — consumers use `go get` against the
# pushed tag, so no binaries are built or attached here. (./cmd is only a demo
# server, not a general-purpose CLI.)
# ---------------------------------------------------------------------------

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Guard: tests must be green before we cut a release ───────────────────
  test:
    name: Test (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test -count=1 -timeout 120s ./...

      - name: Run tests (race detector)
        run: go test -count=1 -race -timeout 120s ./...

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout (full history for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
